<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FighterGame – Character Select</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 2.4rem; margin-bottom: 8px; color: #e94560; letter-spacing: 2px; }
    p.subtitle { color: #aaa; margin-bottom: 32px; }
    .select-area {
      display: flex;
      gap: 64px;
      justify-content: center;
      flex-wrap: nowrap;
      margin-bottom: 32px;
      transform-origin: top center;
      will-change: transform;
    }
    .player-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .player-col h2 { font-size: 1.2rem; color: #e94560; margin-bottom: 4px; }

    /* ── Honeycomb grid ── */
    .hex-grid {
      position: relative;
      /* 3 cols * 100px + half offset = ~340w, 3 rows interwoven */
      width: 340px;
      height: 340px;
    }

    /* Hex sizing */
    :root {
      --hex-w: 100px;
      --hex-h: 112px;  /* hex height for pointy-top ~ w * 1.1547 */
      --hex-gap: 6px;
      --row-step: 84px; /* vertical distance between row centers (3/4 of hex-h) */
      --col-step: 106px; /* hex-w + gap */
      --half-col: 53px;  /* offset for interwoven rows */
    }

    .hex-cell {
      position: absolute;
      width: var(--hex-w);
      height: var(--hex-h);
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      /* no border/bg — the hex shape is purely clip-path */
    }
    .hex-cell:hover { transform: scale(1.1); z-index: 2; }

    /* Hex border via an outer hex behind the inner */
    .hex-border {
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: #2a2a4a;
      transition: background 0.15s;
    }
    .hex-inner {
      position: absolute;
      inset: 3px;
      z-index: 1;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      overflow: hidden;
    }

    .hex-cell img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.15s;
    }
    .hex-cell .hex-name {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: bold;
      color: #d4a825;
      text-align: center;
      line-height: 1;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
      white-space: nowrap;
      z-index: 2;
      transition: font-size 0.2s, color 0.2s;
      pointer-events: none;
    }
    .hex-cell:hover .hex-name {
      font-size: 0.85rem;
      color: #ffd700;
    }
    .hex-cell:hover .hex-border { background: #5580aa; }

    /* Selected states */
    .hex-cell.selected-p1 .hex-border { background: #e84545; }
    .hex-cell.selected-p1 .hex-name { color: #ffd700; font-size: 0.85rem; }

    .hex-cell.selected-p2 .hex-border { background: #45b8e8; }
    .hex-cell.selected-p2 .hex-name { color: #ffd700; font-size: 0.85rem; }

    /* Mirror P2 icons */
    .player-col.p2 .hex-cell img {
      transform: scaleX(-1);
    }

    /* Row / column positions for 3-3-2 honeycomb */
    /* Row 0: 3 hexes */
    .hex-cell[data-idx="0"] { left: 0;                   top: 0; }
    .hex-cell[data-idx="1"] { left: var(--col-step);     top: 0; }
    .hex-cell[data-idx="2"] { left: calc(var(--col-step) * 2); top: 0; }
    /* Row 1: 3 hexes, offset half col */
    .hex-cell[data-idx="3"] { left: var(--half-col);     top: var(--row-step); }
    .hex-cell[data-idx="4"] { left: calc(var(--half-col) + var(--col-step)); top: var(--row-step); }
    .hex-cell[data-idx="5"] { left: calc(var(--half-col) + var(--col-step) * 2); top: var(--row-step); }
    /* Row 2: 2 hexes, centered (aligned with first row's gaps) */
    .hex-cell[data-idx="6"] { left: var(--col-step);     top: calc(var(--row-step) * 2); }
    .hex-cell[data-idx="7"] { left: calc(var(--col-step) * 2); top: calc(var(--row-step) * 2); }

    .options {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .options label { font-size: 1rem; color: #ccc; cursor: pointer; }
    .options input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

    #start-btn {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 14px 48px;
      font-size: 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      opacity: 0.4;
      pointer-events: none;
    }
    #start-btn.ready { opacity: 1; pointer-events: auto; }
    #start-btn:hover.ready { background: #c73652; }
    .selection-summary {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
      height: 20px;
    }
  </style>
</head>
<body>
  <h1>FighterGame</h1>
  <p class="subtitle">Select a character for each player, then start!</p>

  <div class="select-area">
    <div class="player-col p1">
      <h2>Player 1 (Red)</h2>
      <div class="hex-grid">
        {% for num, name in characters.items() %}
        <div class="hex-cell" data-player="1" data-char="{{ num }}" data-idx="{{ loop.index0 }}">
          <div class="hex-border"></div>
          <div class="hex-inner">
            <img src="{{ url_for('static', filename='icons/' + char_images[num]) }}" alt="{{ name }}">
            <span class="hex-name">{{ name }}</span>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    <div class="player-col p2">
      <h2>Player 2 (Green)</h2>
      <div class="hex-grid">
        {% for num, name in characters.items() %}
        <div class="hex-cell" data-player="2" data-char="{{ num }}" data-idx="{{ loop.index0 }}">
          <div class="hex-border"></div>
          <div class="hex-inner">
            <img src="{{ url_for('static', filename='icons/' + char_images[num]) }}" alt="{{ name }}">
            <span class="hex-name">{{ name }}</span>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <div class="options">
    <input type="checkbox" id="bot_play" name="bot_play">
    <label for="bot_play">Player 2 is a bot (AI)</label>
  </div>

  <p class="selection-summary" id="summary"></p>

  <form id="start-form" action="/start" method="POST">
    <input type="hidden" name="char1" id="char1-input" value="">
    <input type="hidden" name="char2" id="char2-input" value="">
    <input type="hidden" name="bot_play" id="bot-input" value="">
    <button type="submit" id="start-btn">Start Game</button>
  </form>

  <script>
    let sel = { 1: null, 2: null };

    document.querySelectorAll('.hex-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const player = cell.dataset.player;
        const char = cell.dataset.char;
        sel[player] = char;

        // Clear same-player highlights
        document.querySelectorAll(`.hex-cell.selected-p${player}`).forEach(c => {
          c.classList.remove(`selected-p${player}`);
        });
        cell.classList.add(`selected-p${player}`);
        updateUI();
      });
    });

    document.getElementById('bot_play').addEventListener('change', updateUI);

    function updateUI() {
      const botChecked = document.getElementById('bot_play').checked;
      const c1El = sel[1] ? document.querySelector(`.hex-cell[data-player="1"][data-char="${sel[1]}"] .hex-name`) : null;
      const c2El = sel[2] ? document.querySelector(`.hex-cell[data-player="2"][data-char="${sel[2]}"] .hex-name`) : null;
      const c1Name = c1El ? c1El.textContent : '?';
      const c2Name = c2El ? c2El.textContent : '?';

      const ready = sel[1] && sel[2];
      const startBtn = document.getElementById('start-btn');
      startBtn.classList.toggle('ready', !!ready);

      document.getElementById('summary').textContent =
        ready ? `P1: ${c1Name}  vs  P2: ${c2Name}${botChecked ? ' (Bot)' : ''}` : '';
    }

    document.getElementById('start-form').addEventListener('submit', e => {
      if (!sel[1] || !sel[2]) { e.preventDefault(); return; }
      document.getElementById('char1-input').value = sel[1];
      document.getElementById('char2-input').value = sel[2];
      document.getElementById('bot-input').value =
        document.getElementById('bot_play').checked ? 'on' : '';
    });

    /* ── Autoscale hex grids to fill viewport ── */
    const selectArea = document.querySelector('.select-area');
    let naturalW = null, naturalH = null;

    function autoScale() {
      // Reset transform to measure natural size
      selectArea.style.transform = 'none';
      selectArea.style.marginBottom = '';
      if (!naturalW) {
        naturalW = selectArea.offsetWidth;
        naturalH = selectArea.offsetHeight;
      }

      // Available space (leave room for title, options, button, padding)
      const availW = window.innerWidth - 48;
      const availH = window.innerHeight - 220;

      const scaleX = availW / naturalW;
      const scaleY = availH / naturalH;
      const scale = Math.min(scaleX, scaleY, 2.5); // cap at 2.5x

      if (scale > 1) {
        selectArea.style.transform = `scale(${scale})`;
        // Adjust margin so elements below don't overlap or float away
        const scaledH = naturalH * scale;
        selectArea.style.marginBottom = (scaledH - naturalH) + 'px';
      }
    }

    autoScale();
    window.addEventListener('resize', autoScale);
  </script>
</body>
</html>
